<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Spartan Exchange</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Spartan Exchange</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Account</a>
        <a href="#">Help</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<main class="cart-page">

    <!-- LEFT SIDE -->
    <section class="cart-left">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
    </section>

    <!-- RIGHT SIDE -->
    <section class="cart-right">
        <h3 id="cart-total">Subtotal: $0.00</h3>
        <button class="checkout-btn">Proceed to Checkout</button>
    </section>

</main>

<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartPage() {
        const cartItemsDiv = document.getElementById("cart-items");
        const cartCount = document.getElementById("cart-count");
        const cartTotal = document.getElementById("cart-total");

        cartItemsDiv.innerHTML = "";

        let total = 0;
        let totalItems = 0;

        if (cart.length === 0) {
            cartItemsDiv.innerHTML = "<p>No items in cart.</p>";
        } else {
            cart.forEach(item => {
                total += item.price * item.quantity;
                totalItems += item.quantity;

                cartItemsDiv.innerHTML += `
                    <div class="cart-item-row">
                        <img src="https://via.placeholder.com/120">
                        
                        <div class="cart-info">
                            <h4>${item.name}</h4>
                            <p>$${item.price.toFixed(2)}</p>

                            <div class="cart-controls">
                                <button onclick="changeQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQuantity(${item.id}, 1)">+</button>
                                <button onclick="removeFromCart(${item.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        cartTotal.innerText = "Subtotal: $" + total.toFixed(2);
        cartCount.innerText = totalItems;

        localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeQuantity(id, amount) {
        const item = cart.find(i => i.id === id);
        if (!item) return;

        item.quantity += amount;

        if (item.quantity <= 0) {
            cart = cart.filter(i => i.id !== id);
        }

        updateCartPage();
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartPage();
    }

    updateCartPage();
</script>

</body>
</html>
