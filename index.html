<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spartan Exchange</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Spartan Exchange</h1>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search products...">
                <button onclick="searchProducts()">Search</button>
            </div>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Account</a>
            <a href="wishlist.html">Wishlist</a>
            <a href ='#'>Help</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <span id="user-info" style="margin-left:20px;"></span>
            <a href="#" onclick="logout()" id="logout-btn" style="display:none;">Logout</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Spartan Exchange</h2>
        <p>Buy from fellow Spartans</p>
    </section>

    <section class="products">
        <h2>Featured Products</h2>
        <div class="product-grid" id="product-grid"></div>
    </section>

    <footer>
        <p>&copy; 2026 Spartan Exchange. All rights reserved.</p>
    </footer>

    <script>
        const user = localStorage.getItem("loggedInUser"); //User Session or login checck

        if (!user) {
            window.location.href = "login.html"; //Connencts to login page
        } else {
            document.getElementById("user-info").innerText = user;
            document.getElementById("logout-btn").style.display = "inline";
        }

        function logout() { //Logout function that clears session and redirects to login page
            localStorage.removeItem("loggedInUser");
            window.location.href = "login.html";
        }

        const products = [ //Temporary items to test webpage functionality
            {
                id: 1,
                name: "Calculus Textbook",
                price: 19.99,
                image: "https://via.placeholder.com/200",
                description: "Used textbook in good condition"
            },
            {
                id: 2,
                name: "Laptop Stand",
                price: 29.99,
                image: "https://via.placeholder.com/200",
                description: "Adjustable aluminum stand"
            },
            {
                id: 3,
                name: "Desk Lamp",
                price: 39.99,
                image: "https://via.placeholder.com/200",
                description: "LED lamp for study desk"
            },
            {
                id: 4,
                name: "Backpack",
                price: 49.99,
                image: "https://via.placeholder.com/200",
                description: "Spacious backpack for students"
            }
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

        function displayProducts(productList) { //Function to display products on the homepage, also used for search results
            const productGrid = document.getElementById("product-grid");
            productGrid.innerHTML = "";

            if (productList.length === 0) { //If no products for search criteria 
                productGrid.innerHTML = "<p>No matching products found.</p>";
                return;
            }

         productList.forEach(product => {
    productGrid.innerHTML += `
        <div class="product">
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <p>$${product.price.toFixed(2)}</p>
            <button onclick="addToCart(${product.id})">Add to Cart</button>
            <button onclick="addToWishlist(${product.id})">Add to Wishlist</button>
        </div>
    `;
});
        }

        function searchProducts() { //Search function that filters products based on name or description
            const searchValue = document.getElementById("search-input").value.toLowerCase().trim();

            const filteredProducts = products.filter(product => //Filtreration functionality 
                product.name.toLowerCase().includes(searchValue) || //Ensures that when searching regardless of upper case or lower case
                product.description.toLowerCase().includes(searchValue)
            );

            displayProducts(filteredProducts);
        }

        function addToCart(productId) { //Shopping cart functionality 
            const product = products.find(p => p.id === productId);

            if (!product) return;
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    quantity: 1
                });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            alert(product.name + " added to cart");
        }
         
        function addToWishlist(productId) { //Wishglist functionalityt 
    const product = products.find(p => p.id === productId);

    if (!product) return;

    const existingItem = wishlist.find(item => item.id === productId);

    if (existingItem) {
        alert(product.name + " is already in your wishlist"); //This ensures that u would not add the same item to wishlist page
        return;
    }

    wishlist.push({
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        description: product.description
    });

    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    alert(product.name + " added to wishlist");
}

        function updateCartCount() {
            const cartCount = document.getElementById("cart-count");

            let totalItems = 0;
            cart.forEach(item => {
                totalItems += item.quantity;
            });

            cartCount.innerText = totalItems;
        }

        displayProducts(products);
        updateCartCount();
    </script>

</body>
</html>
